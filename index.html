<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qianyu Yang | Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
    }
    .card {
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.08);
    }
  </style>
</head>

<body class="text-slate-800">

<header class="text-center py-14 border-b border-sky-200 bg-gradient-to-r from-sky-100 via-white to-emerald-100">
  <h1 class="text-4xl font-bold">Qianyu Yang</h1>
  <p class="text-slate-600 mt-2">GitHub APIで作品を自動表示するポートフォリオ</p>
</header>

<main class="max-w-4xl mx-auto px-6 py-10 space-y-10">

  <!-- About -->
  <section class="bg-white p-6 rounded-3xl card border border-sky-100">
    <h2 class="text-2xl font-bold text-sky-700">About</h2>
    <p class="mt-3 text-slate-700">
      ChatGPTとGitHubを使ってWeb開発を学習している中学生。
      作品はGitHubから自動取得して表示されます。
    </p>
  </section>

  <!-- Projects -->
  <section class="bg-white p-6 rounded-3xl card border border-sky-100">
    <h2 class="text-2xl font-bold text-sky-700">Projects (GitHub Auto)</h2>

    <div id="repoList" class="mt-5 space-y-4">
      <p class="text-slate-500">読み込み中…（GitHubに接続しています）</p>
    </div>
  </section>

  <!-- Contact -->
  <section class="bg-white p-6 rounded-3xl card border border-sky-100">
    <h2 class="text-2xl font-bold text-sky-700">Contact</h2>

    <p class="mt-3">
      Email:
      <a class="text-sky-600 hover:underline" href="mailto:qianyuyang.vip@gmail.com">
        qianyuyang.vip@gmail.com
      </a>
    </p>

    <p class="mt-2">
      GitHub:
      <a class="text-sky-600 hover:underline" href="https://github.com/qianyu-cn" target="_blank">
        github.com/qianyu-cn
      </a>
    </p>
  </section>

</main>

<script>
  const username = "qianyu-cn";
  const repoList = document.getElementById("repoList");

  async function loadRepos() {
    try {
      const res = await fetch(`https://api.github.com/users/${username}/repos`);
      const repos = await res.json();

      // フォーク除外 + 更新順
      const filtered = repos
        .filter(r => !r.fork)
        .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

      repoList.innerHTML = "";

      filtered.forEach(repo => {
        const card = document.createElement("div");
        card.className = "p-5 rounded-2xl bg-sky-50 border border-sky-100";

        card.innerHTML = `
          <div class="flex justify-between items-start gap-4">
            <div>
              <h3 class="text-lg font-semibold">${repo.name}</h3>
              <p class="text-slate-600 text-sm mt-1">
                ${repo.description ? repo.description : "説明なし（たぶん実験）"}
              </p>
            </div>

            <a href="${repo.html_url}" target="_blank"
               class="text-sky-600 text-sm hover:underline">
              GitHub →
            </a>
          </div>

          <div class="mt-3 text-xs text-slate-500">
            ⭐ ${repo.stargazers_count} / updated: ${new Date(repo.updated_at).toLocaleDateString()}
          </div>
        `;

        repoList.appendChild(card);
      });

      if (filtered.length === 0) {
        repoList.innerHTML = "<p class='text-slate-500'>表示できるリポジトリがない</p>";
      }

    } catch (err) {
      repoList.innerHTML = "<p class='text-red-500'>GitHub取得に失敗（API制限の可能性）</p>";
    }
  }

  loadRepos();
</script>

</body>
</html>
