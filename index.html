<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYBER PROFILE</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: #00fff2;
      overflow-x: hidden;
    }

    .glitch {
      font-size: 3rem;
      text-align: center;
      margin-top: 60px;
      position: relative;
      color: #00fff2;
      text-shadow: 0 0 10px #00fff2;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    .glitch::before {
      animation: glitchTop 2s infinite linear alternate-reverse;
      color: #ff00ff;
      top: -2px;
    }

    .glitch::after {
      animation: glitchBottom 1.5s infinite linear alternate-reverse;
      color: #00ff00;
      top: 2px;
    }

    @keyframes glitchTop {
      0% { clip-path: inset(0 0 90% 0); }
      50% { clip-path: inset(10% 0 60% 0); }
      100% { clip-path: inset(0 0 80% 0); }
    }

    @keyframes glitchBottom {
      0% { clip-path: inset(80% 0 0 0); }
      50% { clip-path: inset(40% 0 30% 0); }
      100% { clip-path: inset(70% 0 10% 0); }
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 20px;
      border: 1px solid #00fff2;
      box-shadow: 0 0 20px #00fff2;
      background: rgba(0, 0, 0, 0.6);
    }

    .section {
      margin-bottom: 20px;
    }

    .label {
      color: #ff00ff;
      font-weight: bold;
    }

    .terminal {
      background: black;
      padding: 10px;
      border: 1px solid #00fff2;
      font-size: 0.9rem;
      color: #00ff00;
      height: 120px;
      overflow: hidden;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #00ff00;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="glitch" data-text="CYBER PROFILE">CYBER PROFILE</div>

  <div class="container">
    <div class="section">
      <span class="label">NAME:</span> Qianyu.exe
    </div>
    <div class="section">
      <span class="label">ROLE:</span> MIDDLE SCHOOL STUDENT / HACKER
    </div>
    <div class="section">
      <span class="label">STATUS:</span> ONLINE // CSS occasionally breaks
    </div>
    <div class="section">
      <span class="label">SKILLS:</span> HTML | CSS | JavaScript | Debugging reality
    </div>

    <div class="section terminal">
      > booting profile...<br>
      > loading skills...<br>
      > warning: style instability detected<br>
      > system ready<span class="cursor"></span>
    </div>
  </div>

</body>
</html>
